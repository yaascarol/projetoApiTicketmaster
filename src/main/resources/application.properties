spring.application.name=ticketmaster-api

# Banco H2 — acesse: http://localhost:8080/h2-console
spring.datasource.url=jdbc:h2:mem:ticketmaster
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA — exibe SQL para debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method

# HATEOAS
spring.hateoas.use-hal-as-default-json-media-type=true

# Chave da API Ticketmaster — defina via variável de ambiente: TICKETMASTER_API_KEY
ticketmaster.api.key=${TICKETMASTER_API_KEY:chave-nao-configurada}

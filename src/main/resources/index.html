<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticketmaster API 🎫</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red:        #e8001c;
      --red-dark:   #b0001a;
      --red-light:  #ff4d63;
      --red-pale:   #ffeaed;
      --black:      #0a0a0a;
      --dark:       #141414;
      --dark2:      #1e1e1e;
      --dark3:      #2a2a2a;
      --white:      #ffffff;
      --text:       #f0f0f0;
      --muted:      #888;
      --border:     rgba(255,255,255,.09);
      --shadow:     0 4px 32px rgba(232,0,28,.15);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--black);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: -1;
      background:
        radial-gradient(ellipse 55% 40% at 90% 5%, rgba(232,0,28,.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 50% at 5% 95%, rgba(232,0,28,.07) 0%, transparent 70%),
        var(--black);
    }

    /* ── HEADER ── */
    header {
      padding: 1.2rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,10,.85);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }

    .logo { display: flex; align-items: center; gap: .9rem; }
    .logo-icon {
      width: 2.4rem; height: 2.4rem;
      background: var(--red); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }
    .logo h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem; letter-spacing: 1px;
      color: var(--white); line-height: 1;
    }
    .logo span { font-size: .72rem; color: var(--muted); font-weight: 300; display: block; }

    nav { display: flex; gap: .4rem; flex-wrap: wrap; }
    nav button {
      background: none; border: 1px solid var(--border);
      border-radius: 8px; padding: .45rem 1rem;
      font-family: 'DM Sans', sans-serif; font-size: .82rem; font-weight: 500;
      color: var(--muted); cursor: pointer; transition: all .2s;
    }
    nav button:hover { border-color: var(--red); color: var(--red); }
    nav button.active { background: var(--red); border-color: var(--red); color: #fff; }

    /* ── MAIN ── */
    main { max-width: 1260px; margin: 0 auto; padding: 2.5rem 1.5rem 5rem; }

    /* ── API KEY BAR ── */
    .apikey-panel {
      background: var(--dark2); border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem 1.4rem;
      margin-bottom: 2rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
    }
    .apikey-panel label { font-size: .8rem; font-weight: 500; color: var(--muted); white-space: nowrap; }
    .apikey-panel input {
      flex: 1; min-width: 180px; padding: .5rem 1rem;
      border: 1px solid var(--border); border-radius: 8px;
      font-family: monospace; font-size: .82rem; color: var(--text);
      background: var(--dark3); outline: none; transition: border-color .2s;
    }
    .apikey-panel input:focus { border-color: var(--red); }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: 1.6rem;
    }
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem; letter-spacing: 1px; color: var(--white); line-height: 1;
    }
    .section-title em { color: var(--red); font-style: normal; }

    /* ── SEARCH BAR ── */
    .search-bar { display: flex; gap: .5rem; margin-bottom: 2rem; }
    .search-bar input {
      flex: 1; padding: .7rem 1.1rem;
      border: 1px solid var(--border); border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: .9rem;
      background: var(--dark2); color: var(--text);
      outline: none; transition: border-color .2s;
    }
    .search-bar input:focus { border-color: var(--red); }
    .search-bar input::placeholder { color: var(--muted); }

    .btn-red {
      background: var(--red); color: #fff;
      border: none; border-radius: 8px; padding: .7rem 1.4rem;
      font-family: 'DM Sans', sans-serif; font-size: .9rem; font-weight: 600;
      cursor: pointer; transition: background .2s, transform .1s; white-space: nowrap;
    }
    .btn-red:hover { background: var(--red-dark); }
    .btn-red:active { transform: scale(.97); }

    .btn-outline {
      background: none; color: var(--red);
      border: 1px solid var(--red); border-radius: 8px; padding: .68rem 1.2rem;
      font-family: 'DM Sans', sans-serif; font-size: .9rem; font-weight: 500;
      cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .btn-outline:hover { background: var(--red); color: #fff; }

    /* ── CARDS GRID ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 1.2rem;
    }

    .card {
      background: var(--dark2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.4rem;
      transition: transform .2s, border-color .2s, box-shadow .2s;
      animation: fadeUp .35s ease both;
      position: relative; overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--red), var(--red-light));
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(232,0,28,.35);
      box-shadow: 0 12px 40px rgba(232,0,28,.12);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-id { font-size: .7rem; font-weight: 600; letter-spacing: .08em; color: var(--red); text-transform: uppercase; margin-bottom: .4rem; }
    .card-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.35rem; letter-spacing: .5px; margin-bottom: .25rem; color: var(--white); }
    .card-sub { font-size: .82rem; color: var(--muted); margin-bottom: .9rem; }
    .card-tags { display: flex; flex-wrap: wrap; gap: .35rem; margin-bottom: .9rem; }
    .tag {
      background: rgba(232,0,28,.12); color: var(--red-light);
      border: 1px solid rgba(232,0,28,.2);
      border-radius: 6px; padding: .2rem .65rem;
      font-size: .72rem; font-weight: 500;
    }
    .tag.green  { background: rgba(26,122,80,.15);  color: #4ade80; border-color: rgba(26,122,80,.25); }
    .tag.blue   { background: rgba(36,72,184,.15);  color: #7da4ff; border-color: rgba(36,72,184,.25); }
    .tag.yellow { background: rgba(160,112,0,.15);  color: #fbbf24; border-color: rgba(160,112,0,.25); }
    .tag.white  { background: rgba(255,255,255,.07); color: var(--muted); border-color: var(--border); }

    .card-meta { font-size: .78rem; color: var(--muted); display: flex; gap: 1rem; flex-wrap: wrap; }
    .card-actions { display: flex; gap: .5rem; margin-top: 1.1rem; }
    .btn-sm {
      flex: 1; padding: .42rem .7rem; border-radius: 7px;
      font-size: .78rem; font-weight: 500; font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: all .15s; border: none;
    }
    .btn-sm.edit { background: rgba(232,0,28,.12); color: var(--red-light); border: 1px solid rgba(232,0,28,.2); }
    .btn-sm.edit:hover { background: var(--red); color: #fff; border-color: var(--red); }
    .btn-sm.del  { background: rgba(255,255,255,.05); color: var(--muted); border: 1px solid var(--border); }
    .btn-sm.del:hover { background: #c0392b; color: #fff; border-color: #c0392b; }

    /* ── STATE MESSAGES ── */
    .state-msg { text-align: center; padding: 4rem 1rem; color: var(--muted); }
    .state-msg .icon { font-size: 2.8rem; margin-bottom: .8rem; }
    .state-msg p { font-size: .95rem; }

    /* ── PAGINATION ── */
    .pagination { display: flex; justify-content: center; gap: .4rem; margin-top: 2.5rem; flex-wrap: wrap; }
    .pagination button {
      background: var(--dark2); border: 1px solid var(--border);
      border-radius: 8px; padding: .42rem .9rem;
      font-family: 'DM Sans', sans-serif; font-size: .84rem; font-weight: 500;
      color: var(--muted); cursor: pointer; transition: all .2s;
    }
    .pagination button:hover:not(:disabled) { border-color: var(--red); color: var(--red); }
    .pagination button.current { background: var(--red); border-color: var(--red); color: #fff; }
    .pagination button:disabled { opacity: .35; cursor: default; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.65); backdrop-filter: blur(5px);
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--dark2); border: 1px solid var(--border);
      border-radius: 18px; padding: 2rem;
      width: min(500px, 94vw);
      box-shadow: 0 24px 80px rgba(0,0,0,.5);
      animation: modalIn .22s ease;
      position: relative; max-height: 90vh; overflow-y: auto;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(.95) translateY(10px); }
      to   { opacity: 1; transform: none; }
    }
    .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem; letter-spacing: .5px;
      color: var(--red); margin-bottom: 1.4rem;
    }
    .modal-close {
      position: absolute; top: 1.1rem; right: 1.1rem;
      background: var(--dark3); border: 1px solid var(--border); border-radius: 8px;
      width: 2rem; height: 2rem; display: flex; align-items: center; justify-content: center;
      font-size: .9rem; cursor: pointer; color: var(--muted); transition: all .2s;
    }
    .modal-close:hover { background: var(--red); color: #fff; border-color: var(--red); }

    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: .8rem; font-weight: 500; color: var(--muted); margin-bottom: .4rem; }
    .form-group input, .form-group select {
      width: 100%; padding: .65rem .9rem;
      border: 1px solid var(--border); border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: .9rem; color: var(--text);
      background: var(--dark3); outline: none; transition: border-color .2s;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--red); }
    .form-group select option { background: var(--dark3); }
    .modal-actions { display: flex; gap: .6rem; margin-top: 1.4rem; }

    /* ── AUTH ── */
    .auth-grid { display: flex; gap: 1.4rem; flex-wrap: wrap; align-items: flex-start; }
    .auth-card {
      flex: 1; min-width: 280px;
      background: var(--dark2); border: 1px solid var(--border);
      border-radius: 16px; padding: 1.8rem;
      position: relative; overflow: hidden;
    }
    .auth-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--red), var(--red-light));
    }
    .auth-card-icon { font-size: 1.8rem; margin-bottom: .5rem; display: block; }
    .auth-card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem; letter-spacing: .5px; color: var(--white); margin-bottom: .4rem;
    }
    .auth-card-desc { font-size: .84rem; color: var(--muted); line-height: 1.5; margin-bottom: 1.2rem; }

    .key-result-label { font-size: .76rem; font-weight: 500; color: var(--muted); margin-bottom: .4rem; margin-top: 1.1rem; }
    .key-result-box {
      display: flex; align-items: center; gap: .5rem;
      background: var(--dark3); border: 1px solid var(--border);
      border-radius: 8px; padding: .55rem .9rem;
    }
    .key-result-box code {
      flex: 1; font-size: .76rem; color: var(--red-light);
      word-break: break-all; font-family: monospace;
    }
    .btn-copy {
      background: none; border: none; cursor: pointer;
      font-size: 1rem; padding: .2rem; border-radius: 5px;
      transition: background .15s; color: var(--muted);
    }
    .btn-copy:hover { background: var(--dark3); color: var(--text); }

    /* Keys table */
    .keys-table { width: 100%; border-collapse: collapse; font-size: .83rem; }
    .keys-table th {
      text-align: left; padding: .6rem .75rem;
      font-weight: 500; color: var(--muted); font-size: .73rem;
      text-transform: uppercase; letter-spacing: .06em;
      border-bottom: 1px solid var(--border);
    }
    .keys-table td { padding: .7rem .75rem; border-bottom: 1px solid rgba(255,255,255,.04); vertical-align: middle; }
    .keys-table tr:last-child td { border-bottom: none; }
    .keys-table tr:hover td { background: rgba(255,255,255,.02); }
    .badge {
      display: inline-block; border-radius: 6px; padding: .18rem .65rem;
      font-size: .7rem; font-weight: 600;
    }
    .badge.ativo   { background: rgba(26,122,80,.2);   color: #4ade80; }
    .badge.inativo { background: rgba(192,57,43,.2);    color: #f87171; }
    .badge.READ    { background: rgba(36,72,184,.2);    color: #7da4ff; }
    .badge.WRITE   { background: rgba(232,0,28,.15);    color: var(--red-light); }
    .badge.ADMIN   { background: rgba(160,112,0,.2);    color: #fbbf24; }
    .key-mono { font-family: monospace; font-size: .75rem; color: var(--muted); }
    .btn-revoke {
      background: rgba(192,57,43,.15); color: #f87171; border: none;
      border-radius: 6px; padding: .28rem .8rem;
      font-size: .73rem; font-weight: 500; cursor: pointer;
      transition: all .15s; font-family: 'DM Sans', sans-serif;
    }
    .btn-revoke:hover { background: #c0392b; color: #fff; }
    .btn-usar {
      background: rgba(232,0,28,.12); color: var(--red-light); border: none;
      border-radius: 6px; padding: .28rem .8rem;
      font-size: .73rem; font-weight: 500; cursor: pointer;
      transition: all .15s; font-family: 'DM Sans', sans-serif;
    }
    .btn-usar:hover { background: var(--red); color: #fff; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 500;
      background: var(--dark2); color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px; padding: .8rem 1.3rem;
      font-size: .86rem; font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,.35);
      transition: opacity .3s, transform .3s;
      opacity: 0; transform: translateY(10px); pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { background: #14532d; border-color: #16a34a; color: #bbf7d0; }
    #toast.error   { background: #450a0a; border-color: #b91c1c; color: #fca5a5; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🎫</div>
    <div>
      <h1>Ticketmaster API</h1>
      <span>Explorer v2.0</span>
    </div>
  </div>
  <nav>
    <button class="active" onclick="goTo('artistas')">🎤 Artistas</button>
    <button onclick="goTo('eventos')">🎪 Eventos</button>
    <button onclick="goTo('ingressos')">🎟️ Ingressos</button>
    <button onclick="goTo('pedidos')">📦 Pedidos</button>
    <button onclick="goTo('usuarios')">👤 Usuários</button>
    <button onclick="goTo('auth')">🔑 Auth</button>
  </nav>
</header>

<main>
  <!-- API Key bar -->
  <div class="apikey-panel" id="apikeyBar">
    <label>🔑 X-API-Key ativa</label>
    <input id="apiKeyInput" type="text" placeholder="Vá em Auth para gerar sua chave…" readonly />
    <button class="btn-outline" onclick="goTo('auth')">Gerenciar →</button>
  </div>

  <!-- Auth Section -->
  <div id="authSection" style="display:none">
    <div class="section-header" style="margin-bottom:1.8rem">
      <div class="section-title">Gerenciar <em>Auth</em></div>
    </div>
    <div class="auth-grid">
      <div class="auth-card">
        <span class="auth-card-icon">🗝️</span>
        <h3 class="auth-card-title">Gerar nova chave</h3>
        <p class="auth-card-desc">Crie uma API Key para autenticar requisições de escrita (POST, PUT, DELETE).</p>
        <div class="form-group">
          <label>Responsável *</label>
          <input id="reg_owner" type="text" placeholder="Ex: Yasmin" />
        </div>
        <div class="form-group">
          <label>Nível de acesso</label>
          <select id="reg_level">
            <option value="READ">READ — só consultas</option>
            <option value="WRITE" selected>WRITE — consultas + alterações</option>
            <option value="ADMIN">ADMIN — acesso completo</option>
          </select>
        </div>
        <button class="btn-red" style="width:100%" onclick="registrar()">Gerar chave 🗝️</button>

        <div id="reg_result" style="display:none">
          <div class="key-result-label">Sua chave (copie agora!):</div>
          <div class="key-result-box">
            <code id="reg_keyValue"></code>
            <button class="btn-copy" onclick="copiarChave()" title="Copiar">📋</button>
          </div>
          <button class="btn-outline" style="width:100%;margin-top:.8rem" onclick="usarChave()">Usar esta chave agora</button>
        </div>
      </div>

      <div class="auth-card" style="flex:2">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem">
          <div>
            <span style="font-size:1.4rem">🛡️</span>
            <span class="auth-card-title" style="margin-left:.5rem">Chaves cadastradas</span>
          </div>
          <button class="btn-outline" onclick="carregarChaves()" style="font-size:.78rem;padding:.38rem .9rem">↻ Atualizar</button>
        </div>
        <div id="keysTable">
          <div class="state-msg"><div class="icon">🔑</div><p>Clique em Atualizar para carregar.</p></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Normal sections -->
  <div id="normalSection">
    <div class="section-header">
      <h2 class="section-title" id="sectionTitle"><em>Artistas</em></h2>
      <button class="btn-red" id="btnNovo" onclick="abrirModal()">+ Novo</button>
    </div>
    <div class="search-bar">
      <input id="searchInput" type="text" placeholder="Buscar por nome…" />
      <button class="btn-red" onclick="buscar()">Buscar</button>
      <button class="btn-outline" onclick="resetBusca()">Limpar</button>
    </div>
    <div id="content">
      <div class="state-msg"><div class="icon">🎫</div><p>Carregando…</p></div>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" onclick="fecharModal()">✕</button>
    <div class="modal-title" id="modalTitle">Novo registro</div>
    <div id="modalForm"></div>
    <div class="modal-actions">
      <button class="btn-red" onclick="salvar()" style="flex:1">Salvar</button>
      <button class="btn-outline" onclick="fecharModal()">Cancelar</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  const BASE = window.location.origin;
  let currentSection = 'artistas';
  let currentPage    = 0;
  let totalPages     = 1;
  let editingId      = null;
  let searchTerm     = '';

  const sectionConfig = {
    artistas:  { title: '<em>Artistas</em>',      path: '/artistas',    fields: artistaFields,  render: renderArtista  },
    eventos:   { title: '<em>Eventos</em>',        path: '/eventos',     fields: eventoFields,   render: renderEvento   },
    ingressos: { title: '<em>Ingressos</em>',      path: '/ingressos',   fields: ingressoFields, render: renderIngresso },
    pedidos:   { title: '<em>Pedidos</em>',        path: '/pedidos',     fields: pedidoFields,   render: renderPedido   },
    usuarios:  { title: '<em>Usuários</em>',       path: '/usuarios',    fields: usuarioFields,  render: renderUsuario  },
  };

  const sections = ['artistas','eventos','ingressos','pedidos','usuarios','auth'];

  function apiKey() { return document.getElementById('apiKeyInput').value.trim(); }

  async function req(path, method='GET', body=null) {
    const headers = { 'Content-Type': 'application/json', 'X-API-Version': 'v2' };
    if (apiKey()) headers['X-API-Key'] = apiKey();
    if (method === 'POST') headers['Idempotency-Key'] = crypto.randomUUID();
    const res = await fetch(BASE + path, { method, headers, body: body ? JSON.stringify(body) : undefined });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.mensagem || err.message || err.erro || `Erro ${res.status}`);
    }
    if (res.status === 204) return null;
    return res.json();
  }

  // ── NAVIGATION ──
  function goTo(section) {
    currentSection = section;
    currentPage    = 0;
    searchTerm     = '';
    document.getElementById('searchInput') && (document.getElementById('searchInput').value = '');

    document.querySelectorAll('nav button').forEach((b,i) => b.classList.toggle('active', sections[i] === section));

    const isAuth = section === 'auth';
    document.getElementById('authSection').style.display   = isAuth ? 'block' : 'none';
    document.getElementById('apikeyBar').style.display     = isAuth ? 'none'  : 'flex';
    document.getElementById('normalSection').style.display = isAuth ? 'none'  : 'block';

    if (isAuth) { carregarChaves(); return; }

    document.getElementById('sectionTitle').innerHTML = sectionConfig[section].title;
    loadData();
  }

  // ── LOAD DATA ──
  async function loadData() {
    const cfg = sectionConfig[currentSection];
    const content = document.getElementById('content');
    content.innerHTML = '<div class="state-msg"><div class="icon">🎫</div><p>Carregando…</p></div>';
    try {
      let path = cfg.path + `?page=${currentPage}&size=9&sort=id,asc`;
      if (searchTerm) path = cfg.path + `/busca?nome=${encodeURIComponent(searchTerm)}&page=${currentPage}&size=9`;
      const data = await req(path);
      const items = data?._embedded
        ? Object.values(data._embedded)[0]
        : (Array.isArray(data.content) ? data.content : (Array.isArray(data) ? data : []));
      totalPages = data?.page?.totalPages ?? 1;
      if (!items || !items.length) {
        content.innerHTML = '<div class="state-msg"><div class="icon">🔍</div><p>Nenhum resultado encontrado.</p></div>';
        document.getElementById('pagination').innerHTML = '';
        return;
      }
      content.innerHTML = `<div class="cards-grid">${items.map(cfg.render).join('')}</div>`;
      renderPagination();
    } catch(e) {
      content.innerHTML = `<div class="state-msg"><div class="icon">❌</div><p>${e.message}</p></div>`;
    }
  }

  // ── PAGINATION ──
  function renderPagination() {
    const el = document.getElementById('pagination');
    if (totalPages <= 1) { el.innerHTML = ''; return; }
    let html = `<button ${currentPage===0?'disabled':''} onclick="changePage(${currentPage-1})">← Anterior</button>`;
    for (let i = 0; i < totalPages; i++) {
      if (i < 2 || i >= totalPages-2 || Math.abs(i-currentPage) <= 1)
        html += `<button class="${i===currentPage?'current':''}" onclick="changePage(${i})">${i+1}</button>`;
      else if (i === 2 || i === totalPages-3)
        html += `<button disabled>…</button>`;
    }
    html += `<button ${currentPage>=totalPages-1?'disabled':''} onclick="changePage(${currentPage+1})">Próxima →</button>`;
    el.innerHTML = html;
  }
  function changePage(p) { currentPage = p; loadData(); }

  // ── SEARCH ──
  function buscar() { searchTerm = document.getElementById('searchInput').value.trim(); currentPage = 0; loadData(); }
  function resetBusca() { searchTerm = ''; document.getElementById('searchInput').value = ''; currentPage = 0; loadData(); }
  document.getElementById('searchInput').addEventListener('keydown', e => { if(e.key==='Enter') buscar(); });

  // ── AUTH ──
  async function registrar() {
    const owner = document.getElementById('reg_owner').value.trim();
    const level = document.getElementById('reg_level').value;
    if (!owner) { toast('Informe seu nome!', 'error'); return; }
    try {
      const data = await req('/api/auth/api-keys', 'POST', { owner, accessLevel: level });
      document.getElementById('reg_keyValue').textContent = data.apiKey || data.keyValue || '';
      document.getElementById('reg_result').style.display = 'block';
      toast('Chave gerada com sucesso! 🗝️', 'success');
      carregarChaves();
    } catch(e) { toast(e.message, 'error'); }
  }

  function copiarChave() {
    const key = document.getElementById('reg_keyValue').textContent;
    navigator.clipboard.writeText(key).then(() => toast('Chave copiada! 📋', 'success'));
  }

  function usarChave() {
    const key = document.getElementById('reg_keyValue').textContent;
    document.getElementById('apiKeyInput').value = key;
    toast('Chave definida como ativa! 🎫', 'success');
    goTo('artistas');
  }

  async function carregarChaves() {
    const el = document.getElementById('keysTable');
    el.innerHTML = '<div class="state-msg"><div class="icon">🎫</div><p>Carregando…</p></div>';
    try {
      const keys = await req('/api/auth/api-keys');
      if (!keys.length) {
        el.innerHTML = '<div class="state-msg"><div class="icon">🔑</div><p>Nenhuma chave cadastrada ainda.</p></div>';
        return;
      }
      el.innerHTML = `
        <table class="keys-table">
          <thead><tr>
            <th>#</th><th>Responsável</th><th>Chave</th><th>Nível</th><th>Status</th><th>Criada em</th><th>Ações</th>
          </tr></thead>
          <tbody>${keys.map(k => `
            <tr>
              <td>${k.id}</td>
              <td><strong>${k.owner}</strong></td>
              <td><span class="key-mono">${(k.apiKey||k.keyValue||'').substring(0,18)}…</span></td>
              <td><span class="badge ${k.accessLevel}">${k.accessLevel}</span></td>
              <td><span class="badge ${k.active?'ativo':'inativo'}">${k.active?'Ativa':'Revogada'}</span></td>
              <td>${k.createdAt ? new Date(k.createdAt).toLocaleDateString('pt-BR') : '—'}</td>
              <td style="display:flex;gap:.4rem;flex-wrap:wrap">
                ${k.active
                  ? `<button class="btn-usar" onclick="aplicarChave('${k.apiKey||k.keyValue||''}')">Usar</button>
                     <button class="btn-revoke" onclick="revogarChave(${k.id})">Revogar</button>`
                  : '<span style="color:var(--muted);font-size:.75rem">—</span>'}
              </td>
            </tr>`).join('')}
          </tbody>
        </table>`;
    } catch(e) { el.innerHTML = `<div class="state-msg"><div class="icon">❌</div><p>${e.message}</p></div>`; }
  }

  function aplicarChave(key) {
    document.getElementById('apiKeyInput').value = key;
    toast('Chave ativa definida! 🎫', 'success');
  }

  async function revogarChave(id) {
    if (!confirm('Revogar esta chave? Ela não poderá mais ser usada.')) return;
    try {
      await req('/api/auth/api-keys/' + id, 'DELETE');
      toast('Chave revogada!', 'success');
      carregarChaves();
    } catch(e) { toast(e.message, 'error'); }
  }

  // ── RENDER CARDS ──
  function renderArtista(a) {
    return `<div class="card">
      <div class="card-id">#${a.id} · Artista</div>
      <div class="card-name">${a.nome}</div>
      <div class="card-sub">${a.genero || '—'}</div>
      <div class="card-tags">
        ${a.genero ? `<span class="tag">${a.genero}</span>` : ''}
        ${a.totalEventos ? `<span class="tag green">🎪 ${a.totalEventos} evento(s)</span>` : ''}
      </div>
      <div class="card-meta"><span>📝 ${a.bio || 'Sem bio'}</span></div>
      <div class="card-actions">
        <button class="btn-sm edit" onclick="abrirModal(${a.id})">Editar</button>
        <button class="btn-sm del"  onclick="deletar(${a.id})">Deletar</button>
      </div>
    </div>`;
  }

  function renderEvento(e) {
    const data = e.dataEvento ? new Date(e.dataEvento).toLocaleDateString('pt-BR') : '—';
    const statusColor = { CONFIRMADO: 'green', PREVISTO: 'yellow', CANCELADO: 'del', ENCERRADO: 'white' };
    return `<div class="card">
      <div class="card-id">#${e.id} · Evento</div>
      <div class="card-name">${e.nome}</div>
      <div class="card-sub">📅 ${data} · 📍 ${e.local || '—'}</div>
      <div class="card-tags">
        <span class="tag ${statusColor[e.status]||''}">${e.status || '—'}</span>
        ${(e.artistas||[]).slice(0,2).map(n=>`<span class="tag blue">🎤 ${n}</span>`).join('')}
        ${e.totalIngressos ? `<span class="tag">🎟️ ${e.totalIngressos} ingresso(s)</span>` : ''}
      </div>
      <div class="card-actions">
        <button class="btn-sm edit" onclick="abrirModal(${e.id})">Editar</button>
        <button class="btn-sm del"  onclick="deletar(${e.id})">Deletar</button>
      </div>
    </div>`;
  }

  function renderIngresso(i) {
    return `<div class="card">
      <div class="card-id">#${i.id} · Ingresso</div>
      <div class="card-name">${i.tipo || '—'}</div>
      <div class="card-sub">${i.nomeEvento || '—'}</div>
      <div class="card-tags">
        <span class="tag green">R$ ${Number(i.preco||0).toFixed(2)}</span>
        <span class="tag yellow">🎟️ ${i.quantidadeDisponivel ?? 0} disponíveis</span>
      </div>
      <div class="card-actions">
        <button class="btn-sm edit" onclick="abrirModal(${i.id})">Editar</button>
        <button class="btn-sm del"  onclick="deletar(${i.id})">Deletar</button>
      </div>
    </div>`;
  }

  function renderPedido(p) {
    const data = p.dataPedido ? new Date(p.dataPedido).toLocaleDateString('pt-BR') : '—';
    const statusColor = { CONFIRMADO: 'green', PENDENTE: 'yellow', CANCELADO: 'del', CONCLUIDO: 'blue' };
    return `<div class="card">
      <div class="card-id">#${p.id} · Pedido</div>
      <div class="card-name">${p.nomeUsuario || 'Usuário #' + p.usuarioId}</div>
      <div class="card-sub">📅 ${data}</div>
      <div class="card-tags">
        <span class="tag ${statusColor[p.status]||''}">${p.status || '—'}</span>
        ${p.totalItens ? `<span class="tag">📦 ${p.totalItens} item(s)</span>` : ''}
      </div>
      <div class="card-actions">
        <button class="btn-sm edit" onclick="abrirModal(${p.id})">Editar</button>
        <button class="btn-sm del"  onclick="deletar(${p.id})">Deletar</button>
      </div>
    </div>`;
  }

  function renderUsuario(u) {
    return `<div class="card">
      <div class="card-id">#${u.id} · Usuário</div>
      <div class="card-name">${u.nome}</div>
      <div class="card-sub">✉️ ${u.email}</div>
      <div class="card-tags">
        ${u.perfil?.redeSocial ? `<span class="tag blue">🌐 ${u.perfil.redeSocial}</span>` : ''}
      </div>
      <div class="card-actions">
        <button class="btn-sm edit" onclick="abrirModal(${u.id})">Editar</button>
        <button class="btn-sm del"  onclick="deletar(${u.id})">Deletar</button>
      </div>
    </div>`;
  }

  // ── FORM FIELDS ──
  function artistaFields(d={}) { return `
    <div class="form-group"><label>Nome *</label><input id="f_nome" value="${d.nome||''}" placeholder="Taylor Swift" /></div>
    <div class="form-group"><label>Gênero Musical *</label>
      <select id="f_genero">
        ${['POP','ROCK','SERTANEJO','FUNK','MPB','ELETRONICA','HIP_HOP','JAZZ','CLASSICA','GOSPEL']
          .map(g=>`<option ${d.genero===g?'selected':''}>${g}</option>`).join('')}
      </select>
    </div>
    <div class="form-group"><label>Bio</label><input id="f_bio" value="${d.bio||''}" placeholder="Descrição do artista" /></div>
    <div class="form-group"><label>URL da imagem</label><input id="f_urlImagem" value="${d.urlImagem||''}" placeholder="https://..." /></div>
  `; }
  function artistaBody() { return {
    nome: document.getElementById('f_nome').value,
    genero: document.getElementById('f_genero').value,
    bio: document.getElementById('f_bio').value,
    urlImagem: document.getElementById('f_urlImagem').value,
  }; }

  function eventoFields(d={}) {
    const dataVal = d.dataEvento ? d.dataEvento.substring(0,16) : '';
    return `
    <div class="form-group"><label>Nome *</label><input id="f_nome" value="${d.nome||''}" placeholder="Eras Tour — São Paulo" /></div>
    <div class="form-group"><label>Data e hora *</label><input id="f_dataEvento" type="datetime-local" value="${dataVal}" /></div>
    <div class="form-group"><label>Local *</label><input id="f_local" value="${d.local||''}" placeholder="Estádio MorumBIS" /></div>
    <div class="form-group"><label>Descrição</label><input id="f_descricao" value="${d.descricao||''}" placeholder="Detalhes do evento" /></div>
    <div class="form-group"><label>Status *</label>
      <select id="f_status">
        ${['PREVISTO','CONFIRMADO','CANCELADO','ENCERRADO']
          .map(s=>`<option ${d.status===s?'selected':''}>${s}</option>`).join('')}
      </select>
    </div>
  `; }
  function eventoBody() { return {
    nome: document.getElementById('f_nome').value,
    dataEvento: document.getElementById('f_dataEvento').value,
    local: document.getElementById('f_local').value,
    descricao: document.getElementById('f_descricao').value,
    status: document.getElementById('f_status').value,
  }; }

  function ingressoFields(d={}) { return `
    <div class="form-group"><label>ID do Evento *</label><input id="f_eventoId" type="number" value="${d.eventoId||''}" placeholder="1" /></div>
    <div class="form-group"><label>Tipo *</label>
      <select id="f_tipo">
        ${['PISTA','CADEIRA','VIP','CAMAROTE','MEIA_ENTRADA']
          .map(t=>`<option ${d.tipo===t?'selected':''}>${t}</option>`).join('')}
      </select>
    </div>
    <div class="form-group"><label>Preço (R$) *</label><input id="f_preco" type="number" step="0.01" value="${d.preco||''}" placeholder="150.00" /></div>
    <div class="form-group"><label>Quantidade disponível *</label><input id="f_quantidade" type="number" value="${d.quantidadeDisponivel||''}" placeholder="1000" /></div>
  `; }
  function ingressoBody() { return {
    eventoId: Number(document.getElementById('f_eventoId').value),
    tipo: document.getElementById('f_tipo').value,
    preco: Number(document.getElementById('f_preco').value),
    quantidadeDisponivel: Number(document.getElementById('f_quantidade').value),
  }; }

  function pedidoFields(d={}) { return `
    <div class="form-group"><label>ID do Usuário *</label><input id="f_usuarioId" type="number" value="${d.usuarioId||''}" placeholder="1" /></div>
  `; }
  function pedidoBody() { return { usuarioId: Number(document.getElementById('f_usuarioId').value) }; }

  function usuarioFields(d={}) { return `
    <div class="form-group"><label>Nome *</label><input id="f_nome" value="${d.nome||''}" placeholder="Ana Lima" /></div>
    <div class="form-group"><label>E-mail *</label><input id="f_email" type="email" value="${d.email||''}" placeholder="ana@email.com" /></div>
  `; }
  function usuarioBody() { return {
    nome: document.getElementById('f_nome').value,
    email: document.getElementById('f_email').value,
  }; }

  const bodyFn = { artistas: artistaBody, eventos: eventoBody, ingressos: ingressoBody, pedidos: pedidoBody, usuarios: usuarioBody };

  // ── MODAL ──
  async function abrirModal(id=null) {
    editingId = id;
    const cfg = sectionConfig[currentSection];
    const label = currentSection.replace(/s$/,'');
    document.getElementById('modalTitle').textContent = id ? `Editar ${label}` : `Novo(a) ${label}`;
    let data = {};
    if (id) { try { data = await req(cfg.path + '/' + id); } catch(e) {} }
    document.getElementById('modalForm').innerHTML = cfg.fields(data);
    document.getElementById('modalOverlay').classList.add('open');
  }
  function fecharModal() { document.getElementById('modalOverlay').classList.remove('open'); editingId = null; }
  document.getElementById('modalOverlay').addEventListener('click', e => { if(e.target===e.currentTarget) fecharModal(); });

  async function salvar() {
    const cfg  = sectionConfig[currentSection];
    const body = bodyFn[currentSection]();
    try {
      if (editingId) {
        await req(cfg.path + '/' + editingId, 'PUT', body);
        toast('Atualizado com sucesso! ✅', 'success');
      } else {
        await req(cfg.path, 'POST', body);
        toast('Criado com sucesso! 🎫', 'success');
      }
      fecharModal();
      loadData();
    } catch(e) { toast(e.message, 'error'); }
  }

  async function deletar(id) {
    if (!confirm('Tem certeza? Essa ação não pode ser desfeita.')) return;
    const cfg = sectionConfig[currentSection];
    try {
      await req(cfg.path + '/' + id, 'DELETE');
      toast('Deletado com sucesso!', 'success');
      loadData();
    } catch(e) { toast(e.message, 'error'); }
  }

  // ── TOAST ──
  function toast(msg, type='') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(el._t);
    el._t = setTimeout(() => el.className = '', 3200);
  }

  // ── INIT ──
  goTo('artistas');
</script>
</body>
</html>
